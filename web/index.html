<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LN Clean RP HUD</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="hud" class="hud">
      <section class="topRight card">
        <div class="idRow">
          <span>ID <b id="playerId">0</b></span>
          <span id="ping">0ms</span>
        </div>
        <div class="money" id="cash">$0</div>
        <div class="subMoney" id="bank">$0</div>
        <div class="job" id="job">Bürger</div>
      </section>

      <section class="bottomLeft card">
        <div class="locLine" id="street">Unbekannte Straße</div>
        <div class="metaRow">
          <span id="direction">N</span>
          <span id="time">00:00</span>
        </div>
        <div class="stats">
          <div class="dot hp"><i id="healthBar"></i><b id="healthValue">100</b></div>
          <div class="dot ar"><i id="armorBar"></i><b id="armorValue">0</b></div>
          <div class="dot st"><i id="staminaBar"></i><b id="staminaValue">0</b></div>
          <div class="dot hg"><i id="hungerBar"></i><b id="hungerValue">100</b></div>
          <div class="dot dr"><i id="thirstBar"></i><b id="thirstValue">100</b></div>
          <div class="dot sx"><i id="stressBar"></i><b id="stressValue">0</b></div>
        </div>
      </section>

      <section class="voice card">
        <span id="voice" class="voiceBadge">STUMM</span>
        <span id="voiceRange">0m</span>
      </section>

      <section id="vehicle" class="tacho hidden">
        <svg viewBox="0 0 300 300" class="gauge">
          <defs>
            <radialGradient id="dialBg" cx="50%" cy="50%" r="58%">
              <stop offset="0%" stop-color="#2a2d34"/>
              <stop offset="100%" stop-color="#0f1115"/>
            </radialGradient>
          </defs>
          <circle cx="150" cy="150" r="132" class="outerRing" />
          <circle cx="150" cy="150" r="118" fill="url(#dialBg)" />
          <g id="ticks"></g>
          <path d="M55 232 A120 120 0 0 1 245 232" class="redline"/>
          <circle cx="150" cy="150" r="108" class="track" />
          <circle cx="150" cy="150" r="108" class="progress" id="speedStroke" />
          <line x1="150" y1="150" x2="150" y2="56" id="needle" class="needle" />
          <line x1="150" y1="150" x2="150" y2="62" id="needleGlow" class="needleGlow" />
          <circle cx="150" cy="150" r="8" class="hub" />
          <text x="150" y="142" class="unit">KM/H</text>
          <text x="150" y="186" class="speed" id="speed">0</text>
        </svg>
        <div class="fuelWrap">
          <span>Fuel</span>
          <b id="fuelValue">0%</b>
        </div>
        <div class="fuelLine"><i id="fuelBar"></i></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
